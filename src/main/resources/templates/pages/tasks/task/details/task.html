<div class="flex">
    <div class="w-full">
        <div class="text-2xl font-bold">{{ task.title }}</div>
        <div class="my-3">
            <div class="font-semibold text-sm mb-2 opacity-70">Description</div>
            <textarea class="textarea h-96 w-full border-none">
{{ task.description }}</textarea
            >
        </div>
        <div class="my-3">
            <div>
                <div class="text-sm font-semibold opacity-70">Attachments</div>
                <div class="mt-3">
                    <div class="overflow-x-auto">
                        {%
                            include
                            "pages/tasks/task/details/attachment/attachment"
                        %}
                    </div>
                </div>
            </div>
        </div>
        <div class="my-3">
            {% include "pages/tasks/task/details/relatedObjects/relatedObjects" %}
        </div>
        <div class="mt-3">
            {% include "pages/tasks/task/details/activity/activity" %}
        </div>
    </div>
    <div class="p-3 max-w-96 w-full border mx-3 rounded-lg">
        {% include "pages/tasks/task/details/properties/properties" %}
    </div>
</div>
